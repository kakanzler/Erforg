<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Warm parchment base: lighter, softly lit centre fading to a scorched brown edge -->
    <radialGradient id="base" cx="50%" cy="45%" r="75%">
      <stop offset="0%"  stop-color="#efdcb2"/>
      <stop offset="55%" stop-color="#e4cf9f"/>
      <stop offset="100%" stop-color="#cbaf7e"/>
    </radialGradient>

    <!-- Mid-scale mottling / water stains: finer and less cloudy -->
    <filter id="stains" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022 0.02" numOctaves="5" seed="7" stitchTiles="stitch" result="noise"/>
      <!-- Tint the noise toward rusty orange and use its luminance as an alpha mask -->
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.74
                0 0 0 0 0.40
                0 0 0 0 0.13
                1.1 1.1 1.1 0 -1.15" result="stainTinted"/>
    </filter>

    <!-- Fine paper fibre grain -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="19" stitchTiles="stitch" result="fine"/>
      <feColorMatrix in="fine" type="matrix"
        values="0 0 0 0 0.28
                0 0 0 0 0.20
                0 0 0 0 0.10
                0.9 0.9 0.9 0 -0.85" result="grainTinted"/>
    </filter>
  </defs>

  <!-- 1. base gradient -->
  <rect width="1400" height="1000" fill="url(#base)"/>

  <!-- 2. brown stains, multiplied over the base for a natural aged look -->
  <rect width="1400" height="1000" filter="url(#stains)" opacity="0.38" style="mix-blend-mode:multiply"/>

  <!-- 3. subtle fibre grain on top -->
  <rect width="1400" height="1000" filter="url(#grain)" opacity="0.32" style="mix-blend-mode:multiply"/>

  <!-- 4. gentle edge darkening baked into the tile -->
  <radialGradient id="edge" cx="50%" cy="50%" r="72%">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#8a4f22" stop-opacity="0.26"/>
  </radialGradient>
  <rect width="1400" height="1000" fill="url(#edge)"/>
</svg>
